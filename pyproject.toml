[project]
name = "langgraph-tut"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.3",
    "langchain>=0.3",
    "langchain-community>=0.3",
    "langchain-ollama>=0.3",
    "langchain-postgres>=0.0.12",
    "psycopg[binary]>=3.2",
    "python-dotenv>=1.0",
    "streamlit>=1.45",
    "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["ingest", "rag", "app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
