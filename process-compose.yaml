version: "0.5"

processes:
  postgres:
    command: |
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb --pgdata="$PGDATA" --username=postgres
        pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log" -w
        createdb -U postgres ragdb
        psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        pg_ctl stop -D "$PGDATA" -w
      fi
      exec postgres -D "$PGDATA"
    readiness_probe:
      exec:
        command: "pg_isready -U postgres -d ragdb"
      initial_delay_seconds: 2
      period_seconds: 2

  ollama:
    command: "ollama serve"
    readiness_probe:
      http_get:
        host: localhost
        port: 11434
        path: /
      initial_delay_seconds: 2
      period_seconds: 2

  open-webui:
    command: "uvx open-webui serve"
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
    depends_on:
      ollama:
        condition: process_healthy
