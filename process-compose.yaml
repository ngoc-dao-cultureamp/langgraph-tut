version: "0.5"

processes:
  postgres:
    command: |
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb --pgdata="$PGDATA" --username=postgres
        PGHOST="$PGDATA" pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log" -w -o "-k $PGDATA"
        PGHOST="$PGDATA" createdb -U postgres ragdb
        PGHOST="$PGDATA" psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        PGHOST="$PGDATA" pg_ctl stop -D "$PGDATA" -w
      fi
      # Use PGDATA for both data directory and socket directory
      exec postgres -D "$PGDATA" -k "$PGDATA"
    readiness_probe:
      exec:
        command: "pg_isready -h localhost -U postgres -d ragdb"
      initial_delay_seconds: 2
      period_seconds: 5
      failure_threshold: 10

  llama-chat:
    command: "$LLAMA_SERVER_BIN --model $MODELS_DIR/$LLM_FILE --alias $LLM_MODEL_ALIAS --port 8080 --ctx-size 4096 --n-gpu-layers 37"
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /v1/models
      initial_delay_seconds: 10
      period_seconds: 5
      failure_threshold: 30

  llama-embed:
    command: "$LLAMA_SERVER_BIN --model $MODELS_DIR/$EMBED_FILE --alias $EMBED_MODEL_ALIAS --port 8081 --embeddings --n-gpu-layers 99"
    readiness_probe:
      http_get:
        host: localhost
        port: 8081
        path: /v1/models
      initial_delay_seconds: 10
      period_seconds: 5
      failure_threshold: 30
