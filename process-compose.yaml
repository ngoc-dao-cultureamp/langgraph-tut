version: "0.5"

processes:
  postgres:
    command: |
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb --pgdata="$PGDATA" --username=postgres
        pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log" -w
        createdb -U postgres ragdb
        psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        pg_ctl stop -D "$PGDATA" -w
      fi
      exec postgres -D "$PGDATA"
    readiness_probe:
      exec:
        command: "pg_isready -h localhost -U postgres -d ragdb"
      initial_delay_seconds: 2
      period_seconds: 5
      failure_threshold: 10

  llama-chat:
    command: "llama-server --model models/$LLM_FILE --alias $LLM_MODEL_ALIAS --port 8080 --ctx-size 49152 -ngl 99 -ctk q8_0 -ctv q8_0"
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /health
      initial_delay_seconds: 10
      period_seconds: 5
      failure_threshold: 30

  llama-embed:
    command: "llama-server --model models/$EMBED_FILE --alias $EMBED_MODEL_ALIAS --port 8081 --embedding --pooling mean -ngl 99"
    readiness_probe:
      http_get:
        host: localhost
        port: 8081
        path: /health
      initial_delay_seconds: 10
      period_seconds: 5
      failure_threshold: 30
