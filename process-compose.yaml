version: "0.5"

processes:
  postgres:
    command: |
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb --pgdata="$PGDATA" --username=postgres
        pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log" -w
        createdb -U postgres ragdb
        psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        pg_ctl stop -D "$PGDATA" -w
      fi
      # Use PGDATA for both data directory and socket directory
      exec postgres -D "$PGDATA" -k "$PGDATA"
    readiness_probe:
      exec:
        command: "pg_isready -h localhost -U postgres -d ragdb"
      initial_delay_seconds: 2
      period_seconds: 5
      failure_threshold: 10

  llama-chat:
    command: "uv run python -m llama_cpp.server --model $MODELS_DIR/$LLM_FILE --model_alias $LLM_MODEL_ALIAS --port 8080 --n_ctx 49152 --n_gpu_layers 99"
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /health
      initial_delay_seconds: 10
      period_seconds: 5
      failure_threshold: 30

  llama-embed:
    command: "uv run python -m llama_cpp.server --model $MODELS_DIR/$EMBED_FILE --model_alias $EMBED_MODEL_ALIAS --port 8081 --embedding --pooling_type mean --n_gpu_layers 99"
    readiness_probe:
      http_get:
        host: localhost
        port: 8081
        path: /health
      initial_delay_seconds: 10
      period_seconds: 5
      failure_threshold: 30
