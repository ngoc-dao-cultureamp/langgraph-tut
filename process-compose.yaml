version: "0.5"

processes:
  postgres:
    command: |
      if ! pg_ctl status -D "$PGDATA" > /dev/null 2>&1; then
        if [ ! -f "$PGDATA/PG_VERSION" ]; then
          initdb --pgdata="$PGDATA" --username=postgres
          pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log"
          createdb -U postgres ragdb
          psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        else
          pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log"
        fi
      fi
      tail -f "$PGDATA/postgres.log"
    shutdown:
      command: "pg_ctl stop -D \"$PGDATA\""
    readiness_probe:
      exec:
        command: "pg_isready -U postgres -d ragdb"
      initial_delay_seconds: 2
      period_seconds: 2

  ollama:
    command: "ollama serve"
    readiness_probe:
      http_get:
        host: localhost
        port: 11434
        path: /
      initial_delay_seconds: 2
      period_seconds: 2
