version: "0.5"

processes:
  postgres:
    command: |
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb --pgdata="$PGDATA" --username=postgres
        pg_ctl start -D "$PGDATA" -l "$PGDATA/postgres.log" -w
        createdb -U postgres ragdb
        psql -U postgres -d ragdb -c 'CREATE EXTENSION IF NOT EXISTS vector;'
        pg_ctl stop -D "$PGDATA" -w
      fi
      exec postgres -D "$PGDATA"
    readiness_probe:
      exec:
        command: "pg_isready -U postgres -d ragdb"
      initial_delay_seconds: 2
      period_seconds: 2

  llama-chat:
    command: "llama-server --model models/$LLM_FILE --alias $LLM_MODEL --port 8080 --ctx-size 8192 -ngl 99"
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /health
      initial_delay_seconds: 5
      period_seconds: 3

  llama-embed:
    command: "llama-server --model models/$EMBED_FILE --alias $EMBED_MODEL --port 8081 --embedding --pooling mean -ngl 99"
    readiness_probe:
      http_get:
        host: localhost
        port: 8081
        path: /health
      initial_delay_seconds: 5
      period_seconds: 3

  open-webui:
    command: "uvx open-webui serve"
    environment:
      - OPENAI_API_BASE_URL=http://localhost:8080/v1
      - OPENAI_API_KEY=sk-local
    depends_on:
      llama-chat:
        condition: process_healthy
